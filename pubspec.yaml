name: drivedata
description: Aplikace pro sledování dat z jízdy auta a analýzu výkonu.
publish_to: 'none'
version: 1.0.0+2006

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Lokální SQLite databáze
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0
  path: ^1.9.0

  # State management
  provider: ^6.1.1

  # Grafy pro analytiku
  fl_chart: ^1.1.1

  # Formátování dat a čísel
  intl: ^0.20.2

  # Unikátní ID
  uuid: ^4.3.3

  # Ukládání nastavení (téma, barva)
  shared_preferences: ^2.3.2

  # Lokální push notifikace
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  flutter_timezone: ^5.0.1

  # Ikony
  cupertino_icons: ^1.0.6

  # Přílohy k pojistkám a servisu
  file_picker: ^10.3.10
  image_picker: ^1.1.0
  open_filex: ^4.3.4
  path_provider: ^2.1.3
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
